name: gradient-guard
region: ams
services:
- name: web
  source_dir: packages/web
  github:
    repo: manojmallick/gradient-guard
    branch: main
    deploy_on_push: true
  build_command: npm install --include=dev && npm run build
  run_command: npm run start
  environment_slug: node-js
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  health_check:
    http_path: /
  envs:
  - key: NEXT_PUBLIC_API_URL
    value: ${api.PUBLIC_URL}
  - key: NEXT_PUBLIC_APP_URL
    value: ${APP_URL}
  - key: NODE_ENV
    value: production
  - key: NODE_OPTIONS
    value: --max-old-space-size=512
  - key: PORT
    value: '8080'
  - key: GRADIENT_AGENT_KEY_COUNSEL
    scope: RUN_TIME
    type: SECRET
  - key: GRADIENT_AGENT_URL_COUNSEL
    scope: RUN_TIME
    type: SECRET
  routes:
  - path: /
- name: api
  source_dir: packages/api
  github:
    repo: manojmallick/gradient-guard
    branch: main
    deploy_on_push: true
  build_command: npm install --include=dev && npm run build
  run_command: npm start
  environment_slug: node-js
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  health_check:
    http_path: /health
  envs:
  - key: NODE_ENV
    value: production
  - key: API_PORT
    value: '8080'
  - key: DATABASE_URL
    value: ${gradient-guard-db.DATABASE_URL}
  - key: DIGITALOCEAN_API_TOKEN
    scope: RUN_TIME
    type: SECRET
  - key: GRADIENT_MODEL_ACCESS_KEY
    scope: RUN_TIME
    type: SECRET
  - key: GRADIENT_AGENT_KEY_SENTINEL
    scope: RUN_TIME
    type: SECRET
  - key: GRADIENT_AGENT_URL_SENTINEL
    scope: RUN_TIME
    type: SECRET
  - key: GRADIENT_AGENT_KEY_EVIDENCE
    scope: RUN_TIME
    type: SECRET
  - key: GRADIENT_AGENT_URL_EVIDENCE
    scope: RUN_TIME
    value: https://agents.do-ai.run/v1/2f5c17bb-7861-4512-a1a9-db591d3ebb32/evidence-forge/run
  - key: GRADIENT_AGENT_KEY_REMEDIATION
    scope: RUN_TIME
    type: SECRET
  - key: GRADIENT_AGENT_URL_REMEDIATION
    scope: RUN_TIME
    value: https://agents.do-ai.run/v1/e88938d5-ff14-4ca7-9da8-84bcd0e45dca/remediation-advisor/run
  - key: GRADIENT_AGENT_KEY_COUNSEL
    scope: RUN_TIME
    type: SECRET
  - key: GRADIENT_AGENT_URL_COUNSEL
    scope: RUN_TIME
    value: https://agents.do-ai.run/v1/7fc6d684-3abb-4650-a635-65c76b07f414/compliance-counsel/run
  - key: DO_SPACES_KEY
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_ENDPOINT
    value: https://ams3.digitaloceanspaces.com
  - key: DO_SPACES_BUCKET
    value: gradient-guard-evidence
  - key: DO_SPACES_CDN_ENDPOINT
    value: https://gradient-guard-evidence.ams3.cdn.digitaloceanspaces.com
  - key: SLACK_WEBHOOK_URL
    scope: RUN_TIME
    type: SECRET
  - key: DB_SCHEMA
    value: public
  - key: NODE_TLS_REJECT_UNAUTHORIZED
    value: '0'
  routes:
  - path: /api
  - path: /health
databases:
- name: gradient-guard-db
  engine: PG
  version: '16'
  size: db-s-1vcpu-1gb
  num_nodes: 1
workers:
- name: sentinel-worker
  source_dir: packages/api
  github:
    repo: manojmallick/gradient-guard
    branch: main
    deploy_on_push: true
  build_command: npm install --include=dev && npm run build
  run_command: node dist/workers/sentinel-cron.js
  environment_slug: node-js
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  envs:
  - key: DATABASE_URL
    value: ${gradient-guard-db.DATABASE_URL}
  - key: NODE_ENV
    value: production
  - key: NODE_TLS_REJECT_UNAUTHORIZED
    value: '0'
  - key: GRADIENT_AGENT_KEY_SENTINEL
    scope: RUN_TIME
    type: SECRET
  - key: GRADIENT_AGENT_URL_SENTINEL
    scope: RUN_TIME
    type: SECRET
