# ─────────────────────────────────────────────────────────────────────────────
# CI — runs on every PR and push to main
# Runs: type-check, lint, build (web + api), unit tests
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    name: API — build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Web ──────────────────────────────────────────────────────────────────────
  web:
    name: Web — build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    env:
      # Provide dummy values so Next.js build doesn't fail on env validation
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Python agents (syntax check) ────────────────────────────────────────────
  agents:
    name: Agents — lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint agents
        run: ruff check packages/agents/ --select E,F --ignore E501

  # ── Terraform validate ───────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform — validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: terraform init (local backend for validation)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: terraform fmt check
        run: terraform fmt -check -recursive
